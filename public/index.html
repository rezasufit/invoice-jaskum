<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/jaskum-title-logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Melayani berbagai kebutuhan pembersihan" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/jaskum-title-logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Jaskum | Jasa Vakum Profesional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <script>
      if (window.matchMedia('(display-mode: standalone)').matches) {
        if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
          window.location.replace('/invoice');
        }
      }
    </script>
  </body>
</html>
